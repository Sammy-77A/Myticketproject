# ===========================================================
#  MyTicket — Application Configuration (Online Mode)
# ===========================================================

# --- Server ---
server.port=8080

# --- SQLite Datasource ---
spring.datasource.url=jdbc:sqlite:myticket.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- App Mode ---
app.mode=online

# --- JWT ---
app.jwt.secret=myticket-super-secret-key-change-in-production
app.jwt.expiry-ms=86400000

# --- hCaptcha ---
app.hcaptcha.secret=0x0000000000000000000000000000000000000000
app.hcaptcha.enabled=true

# --- Mail (Gmail SMTP) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Safaricom Daraja M-Pesa ---
# NOTE: daraja.callback-url must be a publicly accessible HTTPS URL.
# For local development, run "ngrok http 8080" and paste the URL below.
# In offline mode, the callback is not used — the mock service handles it locally.
daraja.consumer-key=
daraja.consumer-secret=
daraja.shortcode=174379
daraja.passkey=
daraja.callback-url=https://your-ngrok-url.ngrok.io/api/payments/callback
daraja.base-url=https://sandbox.safaricom.co.ke

# --- Google OAuth2 ---
spring.security.oauth2.client.registration.google.client-id=dummy-client-id
spring.security.oauth2.client.registration.google.client-secret=dummy-client-secret
